<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Gg</title>
<style>
  html, body { height:100%; margin:0; }
  body { overflow:hidden; background:#000; touch-action:manipulation; user-select:none; }

  /* Background (assets/background.png) + subtle motion */
  #bg{
    position:fixed; inset:0;
    background-image: url("assets/background.png");
    background-size: cover;
    background-position: 50% 50%;
    animation: bgFloat 12s ease-in-out infinite alternate;
    transform: translateZ(0);
  }
  #bg::after{
    content:"";
    position:absolute; inset:-10%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 55%),
                radial-gradient(circle at 70% 60%, rgba(0,0,0,.18), transparent 55%);
    animation: bgGlow 8s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes bgFloat{
    from{ background-position: 48% 52%; transform: scale(1.02); }
    to  { background-position: 52% 48%; transform: scale(1.04); }
  }
  @keyframes bgGlow{
    from{ opacity:.55; transform: translate3d(-1.5%,1%,0); }
    to  { opacity:.85; transform: translate3d(1.5%,-1%,0); }
  }

  #stage{
    position:fixed; inset:0;
    pointer-events:auto;
  }

  .entity{
    position:absolute;
    transform: translateZ(0);
    will-change: transform;
  }

  /* HP bars */
  .hpWrap{
    position:absolute;
    left:50%;
    bottom:100%;
    transform: translate(-50%, -10px);
    width: 110px;
    height: 10px;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 6px;
    overflow:hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,.35);
  }
  .hpFill{
    height:100%;
    width:100%;
    background: linear-gradient(90deg, #32ff6a, #1fae45);
    transform-origin:left center;
  }
  .hpText{
    position:absolute;
    left:50%;
    top:50%;
    transform: translate(-50%,-50%);
    font: 700 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:#fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.65);
    pointer-events:none;
  }

  /* Dragon */
  #dragon{
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background:#000; /* fallback */
    box-shadow: 0 14px 30px rgba(0,0,0,.45);
  }
  #dragon.hasSprite{
    background-size: contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color: transparent;
  }
  #dragon .hpFill{ background: linear-gradient(90deg, #ff3b3b, #a80000); }

  /* Player sprite */
  #playerSprite{
    position:absolute; left:0; top:0;
    background-repeat:no-repeat;
    image-rendering: auto;
    will-change: background-position, width, height;
    transform-origin: left top;
  }

  /* Small helper */
  #hint{
    position:fixed;
    left:12px; bottom:12px;
    padding:10px 12px;
    border-radius: 12px;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.12);
    color:#fff;
    font: 600 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    pointer-events:none;
  }
</style>
</head>
<body>
<div id="bg"></div>

<div id="stage">
  <div id="dragon" class="entity">
    <div class="hpWrap">
      <div class="hpFill" id="dragonHpFill"></div>
      <div class="hpText" id="dragonHpText">100 / 100</div>
    </div>
  </div>

  <div id="player" class="entity">
    <div class="hpWrap">
      <div class="hpFill" id="playerHpFill"></div>
      <div class="hpText" id="playerHpText">1000 / 1000</div>
    </div>
    <div id="playerSprite"></div>
  </div>
</div>

<div id="hint">Тап/клик — идти в точку. Подойди к дракону — атака.</div>

<script>
(async function(){
  // ====== Load atlas meta ======
  const meta = await fetch("assets/sprite_atlas.json").then(r => r.json());
  const ATLAS_URL = "assets/sprite_atlas.png";
  const ATTACK_URL = "assets/sprite_attack.png"; // existing in assets

  const stage = document.getElementById("stage");
  const playerEl = document.getElementById("player");
  const playerSprite = document.getElementById("playerSprite");
  const playerHpFill = document.getElementById("playerHpFill");
  const playerHpText = document.getElementById("playerHpText");

  const dragonEl = document.getElementById("dragon");
  const dragonHpFill = document.getElementById("dragonHpFill");
  const dragonHpText = document.getElementById("dragonHpText");

  // ====== Dragon sprite (optional) ======
  (function tryDragonSprite(){
    const img = new Image();
    img.onload = () => {
      dragonEl.classList.add("hasSprite");
      dragonEl.style.backgroundImage = 'url("assets/sprite_dragon.png")';
    };
    img.onerror = () => {
      // fallback stays black
    };
    img.src = "assets/sprite_dragon.png";
  })();

  // ====== Player stats ======
  const PLAYER_MAX_HP = 1000;
  let playerHp = PLAYER_MAX_HP;

  const DRAGON_MAX_HP = 100;
  let dragonHp = DRAGON_MAX_HP;

  function updateHpUI(){
    playerHpFill.style.transform = `scaleX(${Math.max(0, playerHp) / PLAYER_MAX_HP})`;
    playerHpText.textContent = `${playerHp} / ${PLAYER_MAX_HP}`;
    dragonHpFill.style.transform = `scaleX(${Math.max(0, dragonHp) / DRAGON_MAX_HP})`;
    dragonHpText.textContent = `${dragonHp} / ${DRAGON_MAX_HP}`;
  }
  updateHpUI();

  // ====== Sprite sizes / scaling ======
  // Walk atlas uses fixed cell size
  const CELL_W = meta.cell_w;
  const CELL_H = meta.cell_h;

  // Attack sheet layout (24 frames x 459w x 392h) - from existing project
  const ATK_FRAME_W = 459;
  const ATK_FRAME_H = 392;
  const ATK_FRAMES = 24;

  // Visual scale (tune if needed)
  let scale = 0.55;

  // ====== World positions are "feet points" ======
  let px = 80;
  let py = window.innerHeight - 60;

  // Spawn near bottom-left on load
  function clampToScreen(){
    // Keep feet on screen with a small margin
    px = Math.max(20, Math.min(window.innerWidth - 20, px));
    py = Math.max(40, Math.min(window.innerHeight - 20, py));
  }
  clampToScreen();

  // Dragon slightly above center
  let dx = Math.round(window.innerWidth * 0.5);
  let dy = Math.round(window.innerHeight * 0.42);

  // ====== Movement ======
  let tx = px, ty = py;
  let moving = false;
  const speed = 240; // px/sec

  // ====== Animation state ======
  let state = "idle"; // idle | walk | attack
  let dir = "walk_down"; // current walk animation key
  let lastDir = dir;

  let frame = 0;
  let frameAcc = 0;

  function setSpriteToWalk(){
    playerSprite.style.backgroundImage = `url("${ATLAS_URL}")`;
    playerSprite.style.backgroundSize = `${meta.max_frames * CELL_W}px ${meta.rows.length * CELL_H}px`;
    playerSprite.style.width = CELL_W + "px";
    playerSprite.style.height = CELL_H + "px";
  }

  function setSpriteToAttack(){
    playerSprite.style.backgroundImage = `url("${ATTACK_URL}")`;
    playerSprite.style.backgroundSize = `${ATK_FRAMES * ATK_FRAME_W}px ${ATK_FRAME_H}px`;
    playerSprite.style.width = ATK_FRAME_W + "px";
    playerSprite.style.height = ATK_FRAME_H + "px";
  }

  setSpriteToWalk();

  function placeEntityFeet(el, feetX, feetY, spriteW, spriteH){
    // position entity container so that sprite bottom-center is at (feetX, feetY)
    const w = spriteW * scale;
    const h = spriteH * scale;
    el.style.transform = `translate3d(${(feetX - w/2).toFixed(2)}px, ${(feetY - h).toFixed(2)}px, 0)`;
    playerSprite.style.transform = `scale(${scale})`;
  }

  function placeDragon(){
    dragonEl.style.transform = `translate3d(${(dx - 28).toFixed(2)}px, ${(dy - 28).toFixed(2)}px, 0)`;
  }
  placeDragon();

  function pickDirByAngle(ax, ay){
    const ang = Math.atan2(ay, ax); // y grows вниз
    const sector = Math.round(ang / (Math.PI / 4)); // -4..4
    switch (sector){
      case 0: return "walk_right";
      case 1: return "walk_down_right";
      case 2: return "walk_down";
      case 3: return "walk_down_left";
      case 4:
      case -4: return "walk_left";
      case -3: return "walk_up_left";
      case -2: return "walk_up";
      case -1: return "walk_up_right";
      default: return "walk_down";
    }
  }

  function setTarget(clientX, clientY){
    tx = clientX;
    ty = clientY;
    moving = true;
    state = "walk";
  }

  stage.addEventListener("pointerdown", (e) => {
    // If dragon is dead - still allow walking
    setTarget(e.clientX, e.clientY);
  }, {passive:true});

  // ====== Attack logic ======
  const ATTACK_RANGE = 90;
  const DPS = 30; // dragon hp per second
  let dmgAcc = 0;

  function dist(a,b,c,d){
    const x = a-c, y = b-d;
    return Math.hypot(x,y);
  }

  // ====== Main loop ======
  let lastT = performance.now();
  function tick(now){
    const dt = Math.min(0.05, (now - lastT) / 1000); // clamp
    lastT = now;

    // Resize handling
    // (keep it lightweight: only update on actual resize)
    // Movement
    if (moving){
      const vx = tx - px;
      const vy = ty - py;
      const d = Math.hypot(vx, vy);
      if (d < 3){
        moving = false;
        state = "idle";
      } else {
        const step = speed * dt;
        const k = step / d;
        px += vx * Math.min(1, k);
        py += vy * Math.min(1, k);

        dir = pickDirByAngle(vx, vy);
        lastDir = dir;
      }
    } else {
      dir = lastDir;
    }

    // Attack trigger: only when NOT moving and near dragon and dragon alive
    const nearDragon = (dragonHp > 0) && (dist(px, py, dx, dy) <= ATTACK_RANGE);
    if (!moving && nearDragon){
      if (state !== "attack"){
        state = "attack";
        frame = 0;
        frameAcc = 0;
        setSpriteToAttack();
      }
      // Damage over time
      dmgAcc += dt;
      const dmg = Math.floor(dmgAcc * DPS);
      if (dmg > 0){
        dmgAcc -= dmg / DPS;
        dragonHp = Math.max(0, dragonHp - dmg);
        updateHpUI();
        if (dragonHp === 0){
          // dragon "dies": hide hp and stop attack
          dragonEl.style.opacity = 0.25;
          state = "idle";
          setSpriteToWalk();
        }
      }
    } else {
      dmgAcc = 0;
      if (state === "attack"){
        state = moving ? "walk" : "idle";
        frame = 0;
        frameAcc = 0;
        setSpriteToWalk();
      }
    }

    // Animation frames
    if (state === "walk"){
      const anim = meta.animations[dir] || meta.animations["walk_down"];
      const fps = anim.fps || 12;
      frameAcc += dt * fps;
      if (frameAcc >= 1){
        const adv = Math.floor(frameAcc);
        frameAcc -= adv;
        frame = (frame + adv) % anim.frames;
      }
      const row = anim.row;
      playerSprite.style.backgroundPosition = `${-frame * CELL_W}px ${-row * CELL_H}px`;
      placeEntityFeet(playerEl, px, py, CELL_W, CELL_H);
    } else if (state === "attack"){
      frameAcc += dt * 14; // attack fps
      if (frameAcc >= 1){
        const adv = Math.floor(frameAcc);
        frameAcc -= adv;
        frame = (frame + adv) % ATK_FRAMES;
      }
      playerSprite.style.backgroundPosition = `${-frame * ATK_FRAME_W}px 0px`;
      placeEntityFeet(playerEl, px, py, ATK_FRAME_W, ATK_FRAME_H);
    } else { // idle
      // show first frame of last direction
      const anim = meta.animations[dir] || meta.animations["walk_down"];
      frame = 0;
      playerSprite.style.backgroundPosition = `${0}px ${-anim.row * CELL_H}px`;
      placeEntityFeet(playerEl, px, py, CELL_W, CELL_H);
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ====== Resize ======
  window.addEventListener("resize", () => {
    clampToScreen();
    dx = Math.round(window.innerWidth * 0.5);
    dy = Math.round(window.innerHeight * 0.42);
    placeDragon();
  });

})();
</script>
</body>
</html>
