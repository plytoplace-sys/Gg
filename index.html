<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Walk</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* персонаж */
#walker{
    position:fixed;
    bottom:60px;
    left:0;

    width:292px;
    height:293px;

    background-image:url("walk_sprite_30_clean.png");
    background-repeat:no-repeat;

    /* 30 кадров */
    background-size:8760px 293px;

    display:none;
}

/* анимация кадров */
.walk{
    animation: walk 1s steps(30) infinite;
}

@keyframes walk{

from{
background-position:0px 0px;
}

to{
background-position:-8760px 0px;
}

}

</style>

</head>
<body>

<div id="walker"></div>

<script>

const walker = document.getElementById("walker");

let x = -300;
let speed = 4;
let running = false;

function start(){

if(running) return;

running = true;

walker.style.display = "block";
walker.classList.add("walk");

move();

}

function move(){

x += speed;

walker.style.transform = "translateX("+x+"px)";

if(x > window.innerWidth){

x = -300;

}

requestAnimationFrame(move);

}

document.addEventListener("click", start);
document.addEventListener("touchstart", start);

</script>

</body>
</html>
