<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Walk Cycle</title>
<style>
  html, body { height:100%; margin:0; }
  body{ overflow:hidden; background:#000; touch-action:manipulation; }

  /* ВНЕШНИЙ КОНТЕЙНЕР: РАЗМЕР ВСЕГДА ОДИН И ТОТ ЖЕ */
  #walkerBox{
    position: fixed;
    left: 0; top: 0;
    width: 292px;
    height: 293px;
    display: none;
    pointer-events: none;
    will-change: transform;
    transform: translate3d(-999px,-999px,0) scale(0.5);
    transform-origin: left top;
  }

  /* ВНУТРЕННИЙ СЛОЙ СО СПРАЙТОМ */
  #sprite{
    position:absolute;
    left:0; top:0;
    background-repeat:no-repeat;
    will-change: background-position, transform;
    transform-origin: left top;
  }

  /* ===== вправо ===== */
  .right{
    width: 292px; height: 293px;
    background-image: url("assets/walk_sprite_30_clean.png");
    background-size: 8760px 293px;
    animation: rightFrames 6s steps(30) infinite;
  }
  @keyframes rightFrames{
    from { background-position: 0 0; }
    to   { background-position: -8760px 0; }
  }

  /* ===== вверх ===== */
  .up{
    width: 332px; height: 302px;
    background-image: url("assets/walk_up_sprite_clean.png");
    background-size: 3984px 302px;
    animation: upFrames 1.8s steps(12) infinite;
  }
  @keyframes upFrames{
    from { background-position: 0 0; }
    to   { background-position: -3984px 0; }
  }

  /* ===== удар ===== */
  .attack{
    width: 459px; height: 392px;
    background-image: url("assets/attack_sprite_clean.png");
    background-size: 11016px 392px; /* 459*24 */
    animation: attackFrames 1.2s steps(24) infinite;
  }
  @keyframes attackFrames{
    from { background-position: 0 0; }
    to   { background-position: -11016px 0; }
  }
</style>
</head>
<body>

  <div id="walkerBox">
    <div id="sprite"></div>
  </div>

<script>
  const box = document.getElementById("walkerBox");
  const sprite = document.getElementById("sprite");

  // Скорость движения
  const speed = 120; // px/сек

  // Базовый размер (контейнер)
  const BASE = { w: 292, h: 293 };

  // Реальные кадры
  const RIGHT = { w: 292, h: 293 };
  const UP    = { w: 332, h: 302 };
  const ATK   = { w: 459, h: 392 };

  // Масштабы
  const scaleGround = 0.5;
  const scaleUpEnd  = 0.42;
  const groundPad = 0;

  let raf = null;
  let phase = "idle"; // right -> up -> attack
  let x = 0, y = 0;
  let lastT = 0;

  function setRight(){
    sprite.className = "right";
    sprite.style.transform = "translate3d(0,0,0) scale(1)";
    sprite.style.animationPlayState = "running";
  }

  function setUp(){
    sprite.className = "up";
    const k = BASE.w / UP.w;          // компенсация ширины
    sprite.style.transform = `translate3d(0,0,0) scale(${k})`;
    sprite.style.animationPlayState = "running";
  }

  function setAttack(){
    sprite.className = "attack";

    // ✅ Подгонка размера удара под базовую ширину (без скачка)
    const k = BASE.w / ATK.w;         // 292/459
    sprite.style.transform = `translate3d(0,0,0) scale(${k})`;

    // удар играет бесконечно
    sprite.style.animationPlayState = "running";
  }

  function resetAndStart(){
    if (raf) cancelAnimationFrame(raf);
    raf = null;

    box.style.display = "block";
    box.style.width = BASE.w + "px";
    box.style.height = BASE.h + "px";

    phase = "right";
    setRight();

    x = -BASE.w;
    y = window.innerHeight - (BASE.h * scaleGround) - groundPad;

    lastT = 0;
    box.style.transform = `translate3d(${x}px,${y}px,0) scale(${scaleGround})`;
    raf = requestAnimationFrame(loop);
  }

  function loop(t){
    if (!lastT) lastT = t;
    const dt = (t - lastT) / 1000;
    lastT = t;

    const midX = window.innerWidth * 0.5;
    const midY = window.innerHeight * 0.5;

    if (phase === "right"){
      x += speed * dt;
      y = window.innerHeight - (BASE.h * scaleGround) - groundPad;

      if (x >= midX){
        phase = "up";
        setUp();
        y = window.innerHeight - (BASE.h * scaleGround) - groundPad;
      }

      box.style.transform = `translate3d(${x}px,${y}px,0) scale(${scaleGround})`;

    } else if (phase === "up"){
      y -= speed * dt;

      const targetY = midY - (BASE.h * scaleUpEnd) * 0.5;
      const startY  = window.innerHeight - (BASE.h * scaleGround) - groundPad;

      const prog = clamp01((startY - y) / (startY - targetY));
      const s = lerp(scaleGround, scaleUpEnd, prog);

      if (y <= targetY){
        // дошёл до середины — включаем удар и стоим на месте
        y = targetY;
        phase = "attack";
        setAttack();

        // фиксируем позицию/масштаб (остаётся как есть, без дальнейшего движения)
        box.style.transform = `translate3d(${x}px,${y}px,0) scale(${scaleUpEnd})`;

        raf = null; // останавливаем loop: больше двигать не надо
        return;
      }

      box.style.transform = `translate3d(${x}px,${y}px,0) scale(${s})`;
    }
  }

  function clamp01(v){ return Math.max(0, Math.min(1, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }

  function onTap(){
    // любой тап = сброс прошлого цикла и старт заново
    resetAndStart();
  }

  document.addEventListener("touchstart", onTap, { passive: true });
  document.addEventListener("click", onTap);
  document.addEventListener("pointerdown", onTap);
</script>
</body>
</html>
