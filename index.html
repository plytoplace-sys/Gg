<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Walk Sprite</title>

  <style>
    html, body { height: 100%; margin: 0; }
    body{
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    /* СПРАЙТ-ПЕРСОНАЖ */
    #walker{
      position: fixed;
      left: 0;
      bottom: 60px;

      /* ⚠️ размер 1 кадра */
      width: 292px;
      height: 293px;

      background-image: url("walk_sprite_30_clean.png");
      background-repeat: no-repeat;

      /* ⚠️ ширина спрайта = 292 * 30 = 8760 */
      background-size: 8760px 293px;

      display: none;
      pointer-events: none;
      will-change: transform, background-position;
      transform: translate3d(-292px,0,0);
    }

    /* бесконечная прокрутка кадров */
    .walking{
      animation: walkFrames 0.9s steps(30) infinite;
    }

    @keyframes walkFrames{
      from { background-position: 0 0; }
      to   { background-position: -8760px 0; }
    }
  </style>
</head>

<body>
  <div id="walker"></div>

  <script>
    const walker = document.getElementById("walker");

    // ⚠️ настройки под твой спрайт
    const frameW = 292;
    const frames = 30;
    const speedPxPerSec = 120; // скорость движения

    let running = false;
    let x = -frameW;   // старт за левым краем
    let lastT = 0;

    function start(){
      if (running) return;
      running = true;

      walker.style.display = "block";
      walker.classList.add("walking");

      x = -frameW;     // слева -> направо
      lastT = 0;
      requestAnimationFrame(loop);
    }

    function loop(t){
      if (!lastT) lastT = t;
      const dt = (t - lastT) / 1000;
      lastT = t;

      x += speedPxPerSec * dt;

      // ✅ сбрасываем только когда ПОЛНОСТЬЮ вышел за правый край
      if (x > window.innerWidth + frameW){
        x = -frameW;
      }

      walker.style.transform = `translate3d(${x}px,0,0)`;
      requestAnimationFrame(loop);
    }

    // тап/клик по экрану запускает
    document.addEventListener("pointerdown", (e) => {
      e.preventDefault?.();
      start();
    }, { passive: false });

  </script>
</body>
</html>
